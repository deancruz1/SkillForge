<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Create an Account</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="fullName">Full Name</label>
        <input
          type="text"
          id="fullName"
          [(ngModel)]="fullName"
          name="fullName"
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-red-500"
          required
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-red-500"
          required
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="password">Password</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-red-500"
          required
        />
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 mb-2" for="role">Role</label>
        <select
          id="role"
          [(ngModel)]="role"
          name="role"
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-red-500"
        >
          <option value="STUDENT">Student</option>
          <option value="INSTRUCTOR">Instructor</option>
        </select>
      </div>

      <button
        type="submit"
        class="w-full bg-red-500 text-white py-2 rounded hover:bg-red-600 font-semibold"
      >
        Register
      </button>
    </form>

    <p class="mt-4 text-center text-gray-600">
      Already have an account?
      <a routerLink="/login" class="text-red-500 hover:underline">Login</a>
    </p>
  </div>
</div>
